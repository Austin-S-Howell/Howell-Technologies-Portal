name: Deploy Operator Portal (Pages)

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Howell-Portal/Admin-Portal-UI/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: Howell-Portal/Admin-Portal-UI

      - name: Configure frontend build mode
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SUPABASE_AUTH_TABLE: ${{ vars.VITE_SUPABASE_AUTH_TABLE }}
          VITE_SUPABASE_AUTH_USERNAME_COLUMN: ${{ vars.VITE_SUPABASE_AUTH_USERNAME_COLUMN }}
          VITE_SUPABASE_AUTH_PASSWORD_COLUMN: ${{ vars.VITE_SUPABASE_AUTH_PASSWORD_COLUMN }}
          VITE_SUPABASE_IDEAS_COLUMN: ${{ vars.VITE_SUPABASE_IDEAS_COLUMN }}
          VITE_SUPABASE_SHARED_IDEAS_USERNAME: ${{ vars.VITE_SUPABASE_SHARED_IDEAS_USERNAME }}
        run: |
          set -euo pipefail
          BASE_PATH="/${{ github.event.repository.name }}/"

          if [ -z "${VITE_SUPABASE_URL}" ]; then
            echo "Missing GitHub variable VITE_SUPABASE_URL."
            exit 1
          fi

          if [ -z "${VITE_SUPABASE_ANON_KEY}" ]; then
            echo "Missing GitHub secret VITE_SUPABASE_ANON_KEY."
            exit 1
          fi

          printf '%s\n' \
            "VITE_PUBLIC_BASE=${BASE_PATH}" \
            "VITE_STATIC_FE_ONLY=true" \
            "VITE_SUPABASE_URL=${VITE_SUPABASE_URL}" \
            "VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}" \
            "VITE_SUPABASE_AUTH_TABLE=${VITE_SUPABASE_AUTH_TABLE:-users}" \
            "VITE_SUPABASE_AUTH_USERNAME_COLUMN=${VITE_SUPABASE_AUTH_USERNAME_COLUMN:-username}" \
            "VITE_SUPABASE_AUTH_PASSWORD_COLUMN=${VITE_SUPABASE_AUTH_PASSWORD_COLUMN:-password}" \
            "VITE_SUPABASE_IDEAS_COLUMN=${VITE_SUPABASE_IDEAS_COLUMN:-ideas}" \
            "VITE_SUPABASE_SHARED_IDEAS_USERNAME=${VITE_SUPABASE_SHARED_IDEAS_USERNAME:-shared}" \
            > apps/operator-portal/.env.production.local

          echo "Configured frontend build for Supabase-backed GitHub Pages deployment."
        working-directory: Howell-Portal/Admin-Portal-UI

      - name: Build operator portal
        run: npm run build --workspace @howell-technologies/operator-portal
        working-directory: Howell-Portal/Admin-Portal-UI

      - name: Verify Pages artifact hygiene
        run: |
          set -euo pipefail
          DIST_DIR="apps/operator-portal/dist"

          if find "$DIST_DIR" -type f \( -name '*.map' -o -name '*.ts' -o -name '*.tsx' -o -name '*.jsx' -o -name '*.mjs.map' -o -name '*.cjs.map' \) | grep -q .; then
            echo "Unexpected source-like files found in Pages artifact:"
            find "$DIST_DIR" -type f \( -name '*.map' -o -name '*.ts' -o -name '*.tsx' -o -name '*.jsx' -o -name '*.mjs.map' -o -name '*.cjs.map' \) | sort
            exit 1
          fi

          if grep -RIn "sourceMappingURL" "$DIST_DIR"; then
            echo "sourceMappingURL reference found in Pages artifact."
            exit 1
          fi

          echo "Pages artifact hygiene check passed."
        working-directory: Howell-Portal/Admin-Portal-UI

      - name: Add SPA fallback
        run: cp apps/operator-portal/dist/index.html apps/operator-portal/dist/404.html
        working-directory: Howell-Portal/Admin-Portal-UI

      - name: Remove custom domain file
        run: rm -f apps/operator-portal/dist/CNAME
        working-directory: Howell-Portal/Admin-Portal-UI

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Howell-Portal/Admin-Portal-UI/apps/operator-portal/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

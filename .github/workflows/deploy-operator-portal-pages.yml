name: Deploy Operator Portal (Pages)

on:
  workflow_dispatch:
    inputs:
      use_custom_domain:
        description: "Include CNAME for portal.howelltechnologies.com"
        required: false
        default: false
        type: boolean
      static_fe_only:
        description: "Build static frontend only (no backend integration)"
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Howell-Portal/Admin-Portal-UI/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: Howell-Portal/Admin-Portal-UI

      - name: Configure frontend build mode
        run: |
          if [ "${{ inputs.static_fe_only }}" = "true" ]; then
            printf "VITE_STATIC_FE_ONLY=true\nVITE_POC_API_BASE_URL=\n" > apps/operator-portal/.env.production.local
            echo "Configured static frontend-only deployment build."
          else
            printf "VITE_STATIC_FE_ONLY=false\n" > apps/operator-portal/.env.production.local
            echo "Configured frontend build with backend integration enabled."
          fi
        working-directory: Howell-Portal/Admin-Portal-UI

      - name: Build operator portal
        run: npm run build --workspace @howell-technologies/operator-portal
        working-directory: Howell-Portal/Admin-Portal-UI

      - name: Ensure custom domain file
        if: ${{ inputs.use_custom_domain }}
        run: |
          if [ ! -f apps/operator-portal/dist/CNAME ]; then
            cp apps/operator-portal/public/CNAME apps/operator-portal/dist/CNAME
          fi
        working-directory: Howell-Portal/Admin-Portal-UI

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Howell-Portal/Admin-Portal-UI/apps/operator-portal/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

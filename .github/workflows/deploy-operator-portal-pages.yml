name: Deploy Operator Portal (Pages)

on:
  workflow_dispatch:
    inputs:
      use_custom_domain:
        description: "Include CNAME for portal.howelltechnologies.com"
        required: false
        default: false
        type: boolean
      static_fe_only:
        description: "Build static frontend only (no backend integration)"
        required: false
        default: true
        type: boolean
      api_base_url:
        description: "API base URL when backend integration is enabled"
        required: false
        default: ""
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Howell-Portal/Admin-Portal-UI/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: Howell-Portal/Admin-Portal-UI

      - name: Configure frontend build mode
        run: |
          set -euo pipefail
          if [ "${{ inputs.use_custom_domain }}" = "true" ]; then
            BASE_PATH="/"
          else
            BASE_PATH="/${{ github.event.repository.name }}/"
          fi

          if [ "${{ inputs.static_fe_only }}" = "true" ]; then
            printf "VITE_PUBLIC_BASE=%s\nVITE_STATIC_FE_ONLY=true\nVITE_POC_API_BASE_URL=\n" "$BASE_PATH" > apps/operator-portal/.env.production.local
            echo "Configured static frontend-only deployment build."
          else
            if [ -z "${{ inputs.api_base_url }}" ]; then
              echo "api_base_url is required when static_fe_only is false."
              exit 1
            fi
            printf "VITE_PUBLIC_BASE=%s\nVITE_STATIC_FE_ONLY=false\nVITE_POC_API_BASE_URL=%s\n" "$BASE_PATH" "${{ inputs.api_base_url }}" > apps/operator-portal/.env.production.local
            echo "Configured frontend build with backend integration enabled."
          fi
        working-directory: Howell-Portal/Admin-Portal-UI

      - name: Build operator portal
        run: npm run build --workspace @howell-technologies/operator-portal
        working-directory: Howell-Portal/Admin-Portal-UI

      - name: Add SPA fallback
        run: cp apps/operator-portal/dist/index.html apps/operator-portal/dist/404.html
        working-directory: Howell-Portal/Admin-Portal-UI

      - name: Remove custom domain file
        if: ${{ !inputs.use_custom_domain }}
        run: rm -f apps/operator-portal/dist/CNAME
        working-directory: Howell-Portal/Admin-Portal-UI

      - name: Ensure custom domain file
        if: ${{ inputs.use_custom_domain }}
        run: |
          if [ ! -f apps/operator-portal/dist/CNAME ]; then
            cp apps/operator-portal/public/CNAME apps/operator-portal/dist/CNAME
          fi
        working-directory: Howell-Portal/Admin-Portal-UI

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Howell-Portal/Admin-Portal-UI/apps/operator-portal/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
